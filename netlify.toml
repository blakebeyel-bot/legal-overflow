# =====================================================================
# Netlify build + functions configuration for Legal Overflow
# =====================================================================

[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Functions use Node 20 (required by @anthropic-ai/sdk and modern deps).
# Bundle with esbuild (faster cold start than zisi).
#
# Agent prompts + config JSONs get pre-baked into netlify/lib/agents-data.js
# by scripts/build-agents-bundle.mjs (run as part of npm run build). That
# avoids the EBUSY race we hit when multiple functions copied the same
# files into their sandboxes simultaneously on Windows.
[functions]
  node_bundler = "esbuild"
  # pdfjs-dist is lazy-loaded inside extract.js / markup-pdf.js (see those
  # files). Keeping it out of external_node_modules lets esbuild bundle
  # only what static imports need, avoiding a prod cold-start failure we
  # hit when pdfjs-dist was declared external.
  #
  # @napi-rs/canvas IS in external_node_modules — it's a native module
  # with platform-specific .node binaries that esbuild can't bundle.
  # pdfjs-dist v5+ dynamically imports it at runtime to polyfill
  # DOMMatrix / Path2D / ImageData on Node (which has no native DOM
  # globals). If left to the bundler, esbuild rewrites the dynamic
  # require, the .node binaries never make it into the function bundle,
  # and pdfjs throws "DOMMatrix is not defined" on first transform.
  external_node_modules = ["@napi-rs/canvas"]
  # pdf.worker.mjs is dynamically imported at runtime by pdfjs's main
  # `pdf.mjs` (it sets `GlobalWorkerOptions.workerSrc ||=
  # "./pdf.worker.mjs"`). esbuild bundles `pdf.mjs` but doesn't follow
  # that dynamic import. The file must be shipped at the expected
  # relative path so pdfjs can resolve it at /var/task/node_modules/...
  included_files = [
    "node_modules/pdfjs-dist/legacy/build/pdf.worker.mjs",
    "node_modules/pdfjs-dist/legacy/build/pdf.worker.min.mjs",
  ]

# Background function — up to 15 min runtime. Name must end in `-background`.
[functions."fanout-background"]
  timeout = 900

# Citation Verifier pipeline — up to 15 min runtime (Pass 1-5). Same
# `-background` naming convention as the contract reviewer fanout.
#
# included_files: esbuild bundles JS imports but NOT runtime readFileSync
# targets. The Bluebook JSON tables and SKILL.md are loaded that way, so
# they need to ship explicitly with the function bundle. Without this
# the function silently dies at cold start with ENOENT before it can
# even update the verification_runs row to "failed".
[functions."verify-citations-pipeline-background"]
  timeout = 900
  included_files = [
    "netlify/lib/citation-verifier/tables/*.json",
    "netlify/lib/citation-verifier/*.md"
  ]

# Short-lived synchronous functions (Netlify default 10s is enough)
[functions."classify"]
  timeout = 30

[functions."verify-citations-start"]
  timeout = 60

[functions."verify-citations-status"]
  timeout = 10

[functions."get-review"]
  timeout = 10

[functions."confirm-review"]
  timeout = 15

[functions."save-profile"]
  timeout = 10

[functions."upload-playbook"]
  timeout = 120

# Workspace chat streaming. AWS Lambda response-streaming caps at 15 min,
# but typical chat responses finish well under 60s. Set 5 min to leave
# headroom for very long responses without holding sockets open forever.
[functions."workspace-chat-send"]
  timeout = 300

# Daily 3 AM UTC purge of user uploads older than 30 days. Implements
# the data-retention promise in /legal/privacy/ (sections 4 + 5) and
# Florida Rule 4-1.6 confidentiality minimization. Auth gate uses the
# CRON_SECRET env var; Netlify's scheduled-function infrastructure
# attaches the secret automatically.
[functions."purge-old-uploads"]
  timeout = 60
  schedule = "0 3 * * *"
